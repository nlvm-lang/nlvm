---
title: "Compile E011 — non-const method called from inside a const method"
file_separator: "#NLFILE"
expected_compile_error: "E011"
---

#NLFILE phase7/e011/Main.nl
namespace phase7.e011;
class Counter {
	private int value;

	public construct() {
		this.value = 0;
	}

	public void bump() {
		this.value = this.value + 1;
	}

	public int broken() const {
		this.bump();
		return this.value;
	}

	public static int main(string[] args) {
		auto c = new Counter();
		return c.broken();
	}
}
