---
title: "system.List<T>.get index out of range surfaces as an unhandled IndexOutOfBoundsException"
file_separator: "#NLFILE"
expected_exit_code: 1
expected_stdout: ""
expected_stderr: "Unhandled exception: IndexOutOfBoundsException: index 2, length 2"
---

#NLFILE phase6/list_oob/Main.nl
namespace phase6.list_oob;
class Main {
	public static int main(string[] args) {
		auto list = new system.List<int>();
		list.pushBack(10);
		list.pushBack(20);
		int x = list.get(2);
		system.Out.print(system.Int.toString(x));
		return 0;
	}
}
