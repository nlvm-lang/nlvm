---
title: "Phase 9 — '+' string concatenation between two field-access operands, no literal/local anchor"
file_separator: "#NLFILE"
expected_exit_code: 0
expected_stdout: "https://example.com/docs\n"
---

#NLFILE phase9/field_concat/Page.nl
namespace phase9.field_concat;
class Page {
	public string root;

	public construct(string root) {
		this.root = root;
	}
}

#NLFILE phase9/field_concat/Item.nl
namespace phase9.field_concat;
class Item {
	public string href;

	public construct(string href) {
		this.href = href;
	}
}

#NLFILE phase9/field_concat/Main.nl
namespace phase9.field_concat;
use phase9.field_concat.Page;
use phase9.field_concat.Item;
class Main {
	public static int main(string[] args) {
		Page page = new Page("https://example.com");
		Item item = new Item("/docs");
		string url = page.root + item.href;
		system.Out.println(url);
		return 0;
	}
}
