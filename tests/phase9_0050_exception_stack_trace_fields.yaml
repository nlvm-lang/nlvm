---
title: "Exception.stackTrace is a walkable ExecutionPoint[] starting at the throw site, one entry per caller"
file_separator: "#NLFILE"
expected_exit_code: 0
expected_stdout: "2 phase9/stacktracefields/Helper.nl:4 phase9/stacktracefields/Main.nl:5"
---

#NLFILE phase9/stacktracefields/Helper.nl
namespace phase9.stacktracefields;
class Helper {
	public static void boom() {
		throw new IllegalArgumentException("bad");
	}
}

#NLFILE phase9/stacktracefields/Main.nl
namespace phase9.stacktracefields;
class Main {
	public static int main(string[] args) {
		try {
			Helper.boom();
		} catch (IllegalArgumentException e) {
			system.Out.print(system.Int.toString(e.stackTrace.length()));
			system.Out.print(" ");
			system.Out.print(e.stackTrace[0].file);
			system.Out.print(":");
			system.Out.print(system.Int.toString(e.stackTrace[0].line));
			system.Out.print(" ");
			system.Out.print(e.stackTrace[1].file);
			system.Out.print(":");
			system.Out.print(system.Int.toString(e.stackTrace[1].line));
		}
		return 0;
	}
}
