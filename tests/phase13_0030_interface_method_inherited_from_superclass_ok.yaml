---
title: "Interface conformance is satisfied by a method inherited from a superclass, not only ones declared directly on the implementing class"
file_separator: "#NLFILE"
expected_exit_code: 0
expected_stdout: ""
---

#NLFILE phase13/e033inherited/Closeable.nl
namespace phase13.e033inherited;
interface Closeable {
	public void close();
}

#NLFILE phase13/e033inherited/BaseHandle.nl
namespace phase13.e033inherited;
class BaseHandle {
	public construct() {}
	public void close() {}
}

#NLFILE phase13/e033inherited/FileHandle.nl
namespace phase13.e033inherited;
class FileHandle extends BaseHandle implements Closeable {
	public construct() { super(); }
}

#NLFILE phase13/e033inherited/Main.nl
namespace phase13.e033inherited;
class Main {
	public static int main(string[] args) {
		FileHandle f = new FileHandle();
		f.close();
		return 0;
	}
}
