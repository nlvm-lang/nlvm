title: "Multi-dimensional array creation (new T[n1][n2]..., partial dimensions)"
file_separator: "#NLFILE"
expected_exit_code: 0
expected_stdout: "1 2 3 4 5 6 rows:3 partial-inner-null:true"
---

#NLFILE phase7/multidim/Main.nl
namespace phase7.multidim;
class Main {
	public static int main(string[] args) {
		int[][] grid = new int[2][3];
		int v = 1;
		for (int i = 0; i < 2; i++) {
			for (int j = 0; j < 3; j++) {
				grid[i][j] = v;
				v++;
			}
		}
		for (int i = 0; i < 2; i++) {
			for (int j = 0; j < 3; j++) {
				system.Out.print(system.Int.toString(grid[i][j]));
				system.Out.print(" ");
			}
		}

		auto cube = new int[3][][];
		system.Out.print("rows:" + system.Int.toString(cube.length()));
		system.Out.print(" ");
		system.Out.print("partial-inner-null:" + system.Bool.toString(cube[0] == null));
		return 0;
	}
}
