---
title: "Unbounded recursion throws a catchable StackOverflowException instead of crashing the process"
file_separator: "#NLFILE"
expected_exit_code: 7
expected_stdout: "caught"
---

#NLFILE phase9/stackoverflow/Main.nl
namespace phase9.stackoverflow;
class Main {
    private static int recurse(int n) {
        return recurse(n + 1);
    }

    public static int main(string[] args) {
        try {
            recurse(0);
            return 1;
        } catch (StackOverflowException e) {
            system.Out.print("caught");
            return 7;
        }
    }
}
