#NLFILE phase7/e039/Main.nl
namespace phase7.e039;
class Main {
	private static void bump(const int[] values) {
		for (auto v : values) {
			v = v + 1;
		}
	}

	public static int main(string[] args) {
		int[] nums = new int[]{1, 2, 3};
		bump(nums);
		return 0;
	}
}
